<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>计组刷题 · 手机版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#4f46e5;--primary-light:#818cf8;--primary-dark:#3730a3;--bg:#f0f2f5;--card:#fff;--text:#1f2937;--text-light:#6b7280;--border:#e5e7eb;--success:#10b981;--danger:#ef4444;--shadow:0 1px 3px rgba(0,0,0,.08);--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding-bottom:72px;min-height:100vh;overflow-x:hidden}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.top-bar .title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px}
.top-bar .stats{font-size:11px;color:var(--text-light);display:flex;gap:8px;align-items:center}
.content{padding:10px 12px;max-width:600px;margin:0 auto}
.stats-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding:2px 0;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-mini{flex-shrink:0;background:var(--card);border-radius:8px;padding:6px 12px;box-shadow:var(--shadow);text-align:center;min-width:64px}
.stat-mini .num{font-size:18px;font-weight:700;color:var(--primary);line-height:1.2}
.stat-mini .lbl{font-size:10px;color:var(--text-light)}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.q-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:10px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.q-number{font-size:11px;color:var(--text-light);font-weight:500}
.q-badges{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.q-type{font-size:10px;padding:2px 7px;border-radius:9px;font-weight:500}
.q-type-dx{background:#dbeafe;color:#2563eb}
.q-type-pd{background:#fef3c7;color:#d97706}
.q-type-tk{background:#d1fae5;color:#059669}
.q-type-jd{background:#ede9fe;color:#7c3aed}
.q-type-js{background:#fce7f3;color:#db2777}
.q-chapter{font-size:10px;padding:2px 7px;background:#f3f4f6;border-radius:9px;color:var(--text-light)}
.star-btn{font-size:20px;line-height:1;cursor:pointer;background:none;border:none;padding:2px}
.q-text{font-size:14px;line-height:1.8;margin-bottom:12px;white-space:pre-wrap;color:var(--text)}
.options{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.opt{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .12s;background:var(--card);user-select:none}
.opt:active{transform:scale(0.98)}
.opt.sel{border-color:var(--primary);background:#eef2ff}
.opt.cr{border-color:var(--success);background:#ecfdf5}
.opt.wr{border-color:var(--danger);background:#fef2f2}
.opt.dis{cursor:default;opacity:.95}
.opt .lt{width:24px;height:24px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;flex-shrink:0}
.opt.cr .lt{background:var(--success);color:#fff}
.opt.wr .lt{background:var(--danger);color:#fff}
.opt.sel .lt{background:var(--primary);color:#fff}
.opt .tx{font-size:13px;line-height:1.5;padding-top:2px;flex:1}
.fill-ipt{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:8px;background:var(--card)}
.fill-ipt:focus{border-color:var(--primary)}
.fill-ipt.cr{border-color:var(--success);background:#ecfdf5}
.fill-ipt.wr{border-color:var(--danger);background:#fef2f2}
.ans-box{background:#f9fafb;border-radius:8px;padding:12px;margin-top:8px;border-left:3px solid var(--primary);display:none;font-size:13px;line-height:1.7}
.ans-box.show{display:block}
.ans-box .albl{font-weight:600;color:var(--primary);font-size:12px;margin-bottom:4px}
.ans-box .act{white-space:pre-wrap}
.rb{padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;margin-bottom:6px}
.rb.cr{background:#ecfdf5;color:var(--success);border:1px solid #a7f3d0}
.rb.wr{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
.nav-row{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:6px}
.nav-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;text-align:center;color:var(--text)}
.nav-btn:active{transform:scale(0.97)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.nav-btn.suc{background:var(--success);color:#fff;border-color:var(--success)}
.nav-page{font-size:12px;color:var(--text-light);text-align:center;min-width:60px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding:3px 0 env(safe-area-inset-bottom,3px) 0;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 2px;cursor:pointer;border:none;background:none;font-size:9px;color:var(--text-light);transition:color .1s;position:relative}
.bnav-item .bi{font-size:18px;line-height:1.2}
.bnav-item .bl{font-size:9px;line-height:1.2}
.bnav-item.active{color:var(--primary)}
.bnav-item .bd{position:absolute;top:0;right:4px;background:var(--danger);color:#fff;font-size:8px;border-radius:7px;padding:0 4px;line-height:13px;min-width:13px;text-align:center}
.ch-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.ch-item{padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.ch-item:active{transform:scale(0.99);border-color:var(--primary-light)}
.ch-item .chn{font-weight:600;font-size:13px}
.ch-item .chc{font-size:11px;color:var(--text-light)}
.data-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.data-card{padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .12s}
.data-card:active{transform:scale(0.99);border-color:var(--primary-light)}
.data-card .dcn{font-weight:600;font-size:13px;margin-bottom:2px}
.data-card .dcd{font-size:11px;color:var(--text-light)}
.data-card .dcs{font-size:11px;color:var(--primary);font-weight:500;margin-top:2px}
.empty{padding:40px 20px;text-align:center;color:var(--text-light)}
.empty .ei{font-size:40px;margin-bottom:8px}
.empty .et{font-size:14px}
.action-row{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.action-btn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;color:var(--text);flex:1;text-align:center;font-weight:500}
.action-btn:active{transform:scale(0.97)}
.action-btn.del{color:var(--danger);border-color:var(--danger)}
.action-btn.pri{color:var(--primary);border-color:var(--primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:var(--radius);padding:20px;max-width:320px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.modal-box h3{font-size:15px;margin-bottom:8px}
.modal-box p{font-size:13px;color:var(--text-light);margin-bottom:16px;line-height:1.5}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;background:var(--card)}
.modal-btns button:active{transform:scale(0.97)}
.modal-btns .confirm{background:var(--danger);color:#fff;border-color:var(--danger)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="top-bar">
  <div class="title"><span>📚</span><span id="pageTitle">计组刷题</span></div>
  <div class="stats">
    <span id="statProg">0/0</span>
    <span id="statWrong" style="color:var(--danger)">✗0</span>
  </div>
</div>

<div class="content" id="mainContent"></div>

<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-item" data-mode="chapter"><span class="bi">📖</span><span class="bl">章节</span></button>
  <button class="bnav-item" data-mode="all"><span class="bi">📝</span><span class="bl">全部</span></button>
  <button class="bnav-item" data-mode="random"><span class="bi">🎲</span><span class="bl">随机</span></button>
  <button class="bnav-item" data-mode="wrong"><span class="bi">❌</span><span class="bl">错题</span><span class="bd" id="wrongBadge" style="display:none">0</span></button>
  <button class="bnav-item" data-mode="browse"><span class="bi">🔍</span><span class="bl">题库</span></button>
</nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">确认</h3>
    <p id="modalText">确定要执行此操作吗？</p>
    <div class="modal-btns">
      <button onclick="closeModal()">取消</button>
      <button class="confirm" id="modalConfirmBtn" onclick="closeModal()">确定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 题库数据 — 在此添加/修改章节和题目
// ============================================================
const QUESTION_BANK = {
  "ch1":{
    id:"ch1",name:"第一章 计算机系统概述",
    questions:[
      {id:"c1_1",type:"danxuan",question:"所谓超大规模集成电路(VLSI),是指一个芯片上能容纳( )电子元件。",options:["A. 数十个","B. 数百个","C. 数千个","D. 数万个以上"],answer:"D"},
      {id:"c1_2",type:"danxuan",question:"对计算机的软、硬件资源进行管理，是( )的功能。",options:["A. 操作系统","B. 数据库管理系统","C. 语言处理程序","D. 用户应用软件"],answer:"A"},
      {id:"c1_3",type:"danxuan",question:"CPU的组成不包括( )。",options:["A. 存储器","B. 寄存器","C. 控制器","D. 运算器"],answer:"A"},
      {id:"c1_4",type:"danxuan",question:"主机上能对指令进行译码的部件是( )。",options:["A. 存储器","B. 寄存器","C. 控制器","D. 运算器"],answer:"C"},
      {id:"c1_5",type:"danxuan",question:"指令寄存器IR存放的是( )。",options:["A. 下一条要执行的指令","B. 已执行完了的指令","C. 正在执行的指令","D. 要转移的指令"],answer:"C"},
      {id:"c1_6",type:"danxuan",question:"按冯·诺依曼结构组成计算机，主机的构成是( )。",options:["A. 运算器和控制器","B. 运算器和内存储器","C. CPU和主存储器","D. 控制器和外部设备"],answer:"C"},
      {id:"c1_7",type:"danxuan",question:"下列描述中正确的是( )。",options:["A. 控制器能理解解释和执行所有指令","B. 计算机包括输入输出设备、控制器、存储器及运算器五个部件","C. 所有数据运算都在控制器中完成","D. 以上都正确"],answer:"B"},
      {id:"c1_8",type:"danxuan",question:"存储在ROM中的软件称为( )。",options:["A. 硬件","B. 软件","C. 固件","D. 芯片"],answer:"C"},
      {id:"c1_9",type:"danxuan",question:"指定待执行指令地址的寄存器是( )。",options:["A. IR","B. PC","C. MAR","D. MDR"],answer:"B"},
      {id:"c1_10",type:"danxuan",question:"将源程序全部翻译成目标程序再执行的称为( )。",options:["A. 目标程序","B. 编译程序","C. 解释程序","D. 汇编程序"],answer:"D"},
      {id:"c1_11",type:"danxuan",question:"层次结构从下往上正确的是( )。",options:["A. 汇编级→OS级→高级级","B. 微程序级→传统级→汇编级","C. 传统级→高级级→汇编级","D. 汇编级→系统分析级→高级级"],answer:"B"},
      {id:"c1_12",type:"danxuan",question:"计算机被定义为( )的集合。",options:["A. 能存储和执行程序的算法和数据结构","B. 指令序列和微指令序列","C. 应用软件和系统软件","D. 软件和硬件"],answer:"A"},
      {id:"c1_13",type:"danxuan",question:"开发并行性的途径有时间重叠、( )和资源共享。",options:["A. 多计算机","B. 多道分时","C. 分布式处理","D. 资源重复"],answer:"D"},
      {id:"c1_14",type:"danxuan",question:"机器语言程序员看到的机器属性是( )。",options:["A. 软件功能","B. 硬件全部组成","C. 编程用到的硬件组成","D. 部件硬件实现"],answer:"C"},
      {id:"c1_15",type:"danxuan",question:"下列说法中不正确的是( )。",options:["A. 软件设计费比复制费高","B. 硬件功能只需实现一次而软件可能要多次","C. 硬件生产费比软件高","D. 硬件设计费比软件设计费高"],answer:"B"},
      {id:"c1_16",type:"danxuan",question:"计算机系统结构不包括( )。",options:["A. 主存速度","B. 机器工作状态","C. 信息保护","D. 数据表示"],answer:"A"},
      {id:"c1_17",type:"danxuan",question:"计算机组成设计不考虑( )。",options:["A. 专用部件","B. 集成度","C. 控制机构","D. 缓冲技术"],answer:"B"},
      {id:"c1_18",type:"danxuan",question:"提高软件功能实现比例可( )。",options:["A. 提高解题速度","B. 减少存储容量","C. 提高灵活性","D. 提高性价比"],answer:"C"},
      {id:"c1_19",type:"danxuan",question:"并行处理分流水线、阵列、多处理机和( )。",options:["A. 计算机网络","B. 控制流","C. 多处理器","D. 数据流"],answer:"D"},
      {id:"c1_20",type:"danxuan",question:"软件移植途径不包括( )。",options:["A. 统一高级语言","B. 统一汇编语言","C. 模拟","D. 仿真"],answer:"B"},
      {id:"c1_21",type:"danxuan",question:"至今大多数计算机仍属于( )计算机。",options:["A. 并行","B. 冯·诺依曼","C. 智能","D. 串行"],answer:"B"},
      {id:"c1_22",type:"danxuan",question:"冯·诺依曼机工作方式的特点是( )。",options:["A. 多指令流单数据流","B. 按地址访问并顺序执行","C. 堆栈操作","D. 按内容选择地址"],answer:"B"},
      {id:"c1_23",type:"danxuan",question:"关于汇编语言正确的表述是( )。",options:["A. 需要硬件知识","B. 对机器依赖性高","C. 编写难度比高级语言小","D. 执行速度比高级语言慢"],answer:"B"},
      {id:"c1_24",type:"danxuan",question:"硬件能直接执行的语言是( )。",options:["A. 符号语言","B. 机器语言","C. 机器与汇编语言","D. 汇编语言"],answer:"B"},
      {id:"c1_25",type:"danxuan",question:"不正确的是( )。",options:["A. 软件实现的操作也可用硬件实现","B. 面向高级语言的机器已实现","C. 固件功能像软件形态像硬件","D. 微程序属硬件级其他四级属软件级"],answer:"B"},
      {id:"c1_26",type:"danxuan",question:"第一台电子数字计算机是( )。",options:["A. EDVAC","B. ENIAC","C. EVNAC","D. EINAC"],answer:"B"},
      {id:"c1_27",type:"danxuan",question:"完整的计算机系统应包括( )。",options:["A. 运算器存储器控制器","B. 外部设备和主机","C. 主机和存储器","D. 配套的硬件和软件"],answer:"D"},
      {id:"c1_28",type:"danxuan",question:"存储器系统是指( )。",options:["A. RAM","B. ROM","C. 内存","D. 内存和外存"],answer:"D"},
      {id:"c1_29",type:"danxuan",question:"信息用二进制表示的理由是( )。",options:["A. 节约元件","B. 运算快","C. 物理器件性能所致","D. 处理方便"],answer:"C"},
      {id:"c1_30",type:"danxuan",question:"一次读一行翻译执行的程序称为( )。",options:["A. 目标程序","B. 编译程序","C. 解释程序","D. 汇编程序"],answer:"C"},
      {id:"c1_31",type:"danxuan",question:"运算器还能进行( )。",options:["A. 初等函数","B. 逻辑运算","C. 对错判断","D. 浮点运算"],answer:"B"},
      {id:"c1_32",type:"danxuan",question:"运算器的核心是( )。",options:["A. 数据总线","B. 多路开关","C. ALU","D. 累加器"],answer:"C"},
      {id:"c1_33",type:"danxuan",question:"浮点数溢出发生在( )。",options:["A. 阶码上溢","B. 尾数上溢","C. 同时上溢","D. 尾数或阶码上溢"],answer:"A"},
      {id:"c1_34",type:"danxuan",question:"关于ALU不正确的是( )。",options:["A. 是组合电路","B. 基本结构是超前进位加法器","C. 输入只有两个数输出是和","D. 74181是典型4位ALU"],answer:"C"},
      {id:"c1_35",type:"panduan",question:"现在数字计算机硬件都由超大规模集成电路构成。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_36",type:"panduan",question:"运算器只能做算术运算。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_37",type:"panduan",question:"存储器存放计算机运行中的数据。",options:["A. 对","B. 错"],answer:"A"},
      {id:"c1_38",type:"panduan",question:"运算器中的临时存放部件叫Cache。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_39",type:"panduan",question:"寄存器是存储器中的一个单元。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_40",type:"panduan",question:"数据存储以\"位\"为单位。",options:["A. 对","B. 错"],answer:"A"},
      {id:"c1_41",type:"panduan",question:"数据最小表示单位是字节。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_42",type:"panduan",question:"存储器容量单位是存储的信息位数。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_43",type:"panduan",question:"CPU可直接到磁盘读指令。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_44",type:"panduan",question:"主机由运算器和存储器构成。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_45",type:"panduan",question:"CPU由控制器和存储器构成。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_46",type:"panduan",question:"C语言也是一种软件。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_47",type:"panduan",question:"汇编程序将高级语言转成可执行代码。",options:["A. 对","B. 错"],answer:"B"},
      {id:"c1_48",type:"panduan",question:"解释执行比编译执行快。",options:["A. 对","B. 错"],answer:"B"},

// ============================================================
const TYPE_LABELS={danxuan:"单选题",panduan:"判断题",tiankong:"填空题",jianda:"简答题",jisuan:"计算题"};
const TYPE_CLASSES={danxuan:"q-type-dx",panduan:"q-type-pd",tiankong:"q-type-tk",jianda:"q-type-jd",jisuan:"q-type-js"};
const LETTERS="ABCDEFGH";

let state={
  mode:"chapter",chapterId:"ch1",currentIndex:0,answered:false,
  selectedOption:null,wrongSet:new Set(),starredSet:new Set(),history:{}
};

// === localStorage ===
function loadData(){
  try{
    const w=localStorage.getItem("ccw");if(w)state.wrongSet=new Set(JSON.parse(w));
    const s=localStorage.getItem("ccs");if(s)state.starredSet=new Set(JSON.parse(s));
    const h=localStorage.getItem("cch");if(h)state.history=JSON.parse(h);
  }catch(e){}
}
function saveData(){
  try{
    localStorage.setItem("ccw",JSON.stringify([...state.wrongSet]));
    localStorage.setItem("ccs",JSON.stringify([...state.starredSet]));
    localStorage.setItem("cch",JSON.stringify(state.history));
  }catch(e){}
}
function clearAllData(){
  state.wrongSet.clear();state.starredSet.clear();state.history={};
  localStorage.removeItem("ccw");localStorage.removeItem("ccs");localStorage.removeItem("cch");
}

// === question helpers ===
function getAllQ(){
  const r=[];
  for(const k in QUESTION_BANK)
    QUESTION_BANK[k].questions.forEach(q=>r.push({...q,chId:k,chName:QUESTION_BANK[k].name}));
  return r;
}
function getChQ(id){
  const c=QUESTION_BANK[id];
  return c?c.questions.map(q=>({...q,chId:id,chName:c.name})):[];
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.random()*i|0;[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function getCurQ(){
  switch(state.mode){
    case"chapter":return getChQ(state.chapterId);
    case"all":return getAllQ();
    case"random":return shuffle(getAllQ());
    case"wrong":return getAllQ().filter(q=>state.wrongSet.has(q.id));
    case"starred":return getAllQ().filter(q=>state.starredSet.has(q.id));
    default:return getChQ(state.chapterId);
  }
}
function findQ(qId){
  return getCurQ().find(q=>q.id===qId);
}

// === render ===
function render(){
  updateStatsAndNav();
  const qs=getCurQ();
  const title=document.getElementById("pageTitle");
  const ct=document.getElementById("mainContent");

  if(state.mode==="browse"){title.textContent="🔍 题库浏览";renderBrowse(ct);return}
  if(state.mode==="chapter"&&!state.chapterId){renderBrowse(ct);return}

  if(qs.length===0){
    const ms={"wrong":"暂无错题 🎉","starred":"暂无收藏 ⭐","chapter":"该章节暂无题目","all":"暂无题目","random":"暂无题目"};
    title.textContent="📝 "+state.mode;
    ct.innerHTML=`<div class="empty"><div class="ei">📭</div><div class="et">${ms[state.mode]||"暂无题目"}</div></div>`;
    return;
  }

  const idx=Math.min(state.currentIndex,qs.length-1);
  const q=qs[idx];
  if(!q)return;

  const titles={chapter:"📖 "+q.chName,all:"📝 全部题目",random:"🎲 随机刷题",wrong:"❌ 错题本",starred:"⭐ 收藏"};
  title.textContent=titles[state.mode]||"刷题";

  const isChoice=q.type==="danxuan"||q.type==="panduan";
  const isFill=q.type==="tiankong";
  const isOpen=q.type==="jianda"||q.type==="jisuan";

  let h=`<div class="progress-bar"><div class="progress-fill" style="width:${((idx+1)/qs.length*100).toFixed(1)}%"></div></div>`;
  h+=`<div class="q-card" data-qid="${q.id}">`;
  h+=`<div class="q-header">`;
  h+=`<span class="q-number">#${idx+1}/${qs.length}</span>`;
  h+=`<div class="q-badges">`;
  if(q.chName)h+=`<span class="q-chapter">${q.chName}</span>`;
  h+=`<span class="q-type ${TYPE_CLASSES[q.type]}">${TYPE_LABELS[q.type]||q.type}</span>`;
  const starred=state.starredSet.has(q.id);
  h+=`<button class="star-btn" data-action="star" data-qid="${q.id}">${starred?'⭐':'☆'}</button>`;
  h+=`</div></div>`;
  h+=`<div class="q-text">${q.question}</div>`;

  if(isChoice){
    h+=`<div class="options">`;
    q.options.forEach((opt,oi)=>{
      const lt=LETTERS[oi];
      let cls="opt";
      if(state.answered){
        cls+=" dis";
        if(lt===q.answer)cls+=" cr";
        else if(lt===state.selectedOption)cls+=" wr";
      }else if(lt===state.selectedOption)cls+=" sel";
      h+=`<div class="${cls}" data-action="pick" data-qid="${q.id}" data-opt="${lt}">`;
      h+=`<span class="lt">${lt}</span><span class="tx">${opt.replace(/^[A-Z]\.\s*/,'')}</span></div>`;
    });
    h+=`</div>`;
    if(state.answered){
      const cr=state.selectedOption===q.answer;
      h+=`<div class="rb ${cr?'cr':'wr'}">${cr?'✅ 正确！':'❌ 错误'}${cr?'':`，正确答案：${q.answer}`}</div>`;
    }
  }

  if(isFill){
    const val=state.answered?state.selectedOption||"":"";
    h+=`<input class="fill-ipt ${state.answered?(state.selectedOption?'cr':'wr'):''}" id="fi_${q.id}" placeholder="输入答案..." value="${val}">`;
    if(!state.answered)h+=`<button class="nav-btn pri" data-action="fillcheck" data-qid="${q.id}" style="padding:8px 16px;flex:none;font-size:12px;display:inline-block">确认</button>`;
    if(state.answered){
      h+=`<div style="font-size:12px;margin-bottom:4px;color:var(--text-light)">正确答案：${q.answer}</div>`;
    }
  }

  if(isOpen){
    const show=state.answered?"show":"";
    if(!state.answered)h+=`<button class="nav-btn pri" data-action="showans" data-qid="${q.id}" style="padding:8px 16px;flex:none;font-size:12px;display:inline-block">查看答案</button>`;
    h+=`<div class="ans-box ${show}" id="abox_${q.id}"><div class="albl">📌 参考答案</div><div class="act">${q.answer}</div></div>`;
  }

  h+=`</div>`;

  h+=`<div class="nav-row">`;
  h+=`<button class="nav-btn" data-action="prev" ${idx===0?'disabled':''}>◀ 上一题</button>`;
  h+=`<span class="nav-page">${idx+1}/${qs.length}</span>`;
  h+=`<button class="nav-btn" data-action="next" ${idx>=qs.length-1?'disabled':''}>下一题 ▶</button>`;
  h+=`</div>`;
  if(state.mode==="random")h+=`<div class="nav-row"><button class="nav-btn suc" data-action="randnext">🎲 下一道随机</button></div>`;

  ct.innerHTML=h;

  if(isFill&&!state.answered){
    const inp=document.getElementById("fi_"+q.id);
    if(inp)setTimeout(()=>inp.focus(),100);
  }
  window.scrollTo({top:0,behavior:"smooth"});
}

function updateStatsAndNav(){
  const all=getAllQ();
  const done=Object.keys(state.history).length;
  document.getElementById("statProg").textContent=done+"/"+all.length;
  document.getElementById("statWrong").textContent="✗"+state.wrongSet.size;
  document.querySelectorAll(".bnav-item").forEach(el=>{
    el.classList.toggle("active",el.dataset.mode===state.mode);
  });
  const wb=document.getElementById("wrongBadge");
  if(state.wrongSet.size>0){wb.style.display="block";wb.textContent=state.wrongSet.size}
  else wb.style.display="none";
}

// === 事件委托：所有点击由这里处理 ===
document.getElementById("mainContent").addEventListener("click",function(e){
  const target=e.target.closest("[data-action]");
  if(!target)return;
  const action=target.dataset.action;
  const qid=target.dataset.qid;
  if(action==="pick"){if(state.answered)return;handlePick(qid,target.dataset.opt);}
  else if(action==="star")handleStar(qid);
  else if(action==="fillcheck")handleFillCheck(qid);
  else if(action==="showans")handleShowAns(qid);
  else if(action==="prev")go(-1);
  else if(action==="next")go(1);
  else if(action==="randnext")nextRand();
});

// 回车提交填空题
document.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    const a=document.activeElement;
    if(a&&a.classList.contains("fill-ipt")){
      const qid=a.id.replace("fi_","");
      if(qid)handleFillCheck(qid);
    }
  }
});

// === 操作函数 ===
function handlePick(qId,opt){
  const q=findQ(qId);if(!q)return;
  if(state.answered)return;
  state.selectedOption=opt;state.answered=true;
  const cr=opt===q.answer;
  state.history[q.id]={correct:cr,count:(state.history[q.id]?.count||0)+1};
  if(cr)state.wrongSet.delete(q.id);else state.wrongSet.add(q.id);
  saveData();render();
}

function handleStar(qId){
  if(state.starredSet.has(qId))state.starredSet.delete(qId);else state.starredSet.add(qId);
  saveData();render();
}

function handleFillCheck(qId){
  if(state.answered)return;
  const inp=document.getElementById("fi_"+qId);if(!inp)return;
  const v=inp.value.trim();if(!v)return;
  const q=findQ(qId);if(!q)return;
  state.answered=true;state.selectedOption=v;
  const n=s=>s.replace(/[\s,，、]/g,"").toLowerCase();
  const nv=n(v);
  const cr=nv===n(q.answer)||q.answer.split(/[,，]/).some(a=>nv.includes(n(a)));
  state.history[q.id]={correct:cr,count:(state.history[q.id]?.count||0)+1};
  if(cr)state.wrongSet.delete(q.id);else state.wrongSet.add(q.id);
  saveData();render();
}

function handleShowAns(qId){
  state.answered=true;
  const b=document.getElementById("abox_"+qId);if(b)b.classList.add("show");
  render();
}

function go(d){
  const qs=getCurQ();const ni=state.currentIndex+d;
  if(ni<0||ni>=qs.length)return;
  state.currentIndex=ni;state.answered=false;state.selectedOption=null;render();
}

function nextRand(){
  const qs=getCurQ();if(!qs.length)return;
  state.currentIndex=Math.random()*qs.length|0;state.answered=false;state.selectedOption=null;render();
}

// === 模式切换 ===
document.getElementById("bottomNav").addEventListener("click",function(e){
  const item=e.target.closest(".bnav-item");if(!item)return;
  const mode=item.dataset.mode;
  if(mode==="chapter"){state.mode="chapter";renderChSelect();updateStatsAndNav();return}
  if(mode==="browse"){state.mode="browse";render();return}
  state.mode=mode;state.currentIndex=0;state.answered=false;state.selectedOption=null;render();
});

function switchCh(id){
  state.chapterId=id;state.mode="chapter";state.currentIndex=0;state.answered=false;state.selectedOption=null;render();
}

// === 章节选择页 ===
function renderChSelect(){
  document.getElementById("pageTitle").textContent="📖 选择章节";
  const ct=document.getElementById("mainContent");
  let t=0;for(const k in QUESTION_BANK)t+=QUESTION_BANK[k].questions.length;
  let h=`<div class="stats-row"><div class="stat-mini"><div class="num">${t}</div><div class="lbl">总题</div></div>`;
  h+=`<div class="stat-mini"><div class="num">${Object.keys(state.history).length}</div><div class="lbl">已答</div></div>`;
  h+=`<div class="stat-mini"><div class="num">${state.wrongSet.size}</div><div class="lbl">错题</div></div>`;
  h+=`<div class="stat-mini"><div class="num">${state.starredSet.size}</div><div class="lbl">收藏</div></div></div>`;
  h+=`<div class="ch-list">`;
  for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];
    const d=c.questions.filter(q=>state.history[q.id]).length;
    h+=`<div class="ch-item" data-ch="${k}"><div><div class="chn">${c.name}</div><div class="chc">${c.questions.length}题 | 已答${d}题</div></div><span style="color:var(--primary);font-size:16px">→</span></div>`;
  }
  h+=`</div><div class="action-row">`;
  h+=`<button class="action-btn pri" data-action="sw-starred">⭐ 收藏 (${state.starredSet.size})</button>`;
  h+=`<button class="action-btn del" data-action="sw-clear">🗑 清空数据</button></div>`;
  ct.innerHTML=h;updateStatsAndNav();
}

// 章节页和浏览页的点击
document.getElementById("mainContent").addEventListener("click",function(e){
  const ch=e.target.closest(".ch-item");if(ch&&ch.dataset.ch){switchCh(ch.dataset.ch);return}
  const a=e.target.closest("[data-action]");if(!a)return;
  const act=a.dataset.action;
  if(act==="sw-starred"){state.mode="starred";state.currentIndex=0;state.answered=false;state.selectedOption=null;render();}
  if(act==="sw-clear")showClearConfirm();
});

// === 浏览页 ===
function renderBrowse(container){
  let h=`<div class="data-grid">`,t=0,cats={},cr=0;
  for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];t+=c.questions.length;
    c.questions.forEach(q=>{cats[q.type]=(cats[q.type]||0)+1;if(state.history[q.id]?.correct)cr++})}
  h+=`<div class="data-card"><div class="dcn">📊 总统计</div><div class="dcd">${t}题 | 已答${Object.keys(state.history).length} | 正确${cr} | 错题${state.wrongSet.size}</div><div class="dcs">`;
  for(const t in cats)h+=`${TYPE_LABELS[t]||t}:${cats[t]} `;
  h+=`</div></div>`;
  for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];
    const d=c.questions.filter(q=>state.history[q.id]).length;
    const r=c.questions.filter(q=>state.history[q.id]?.correct).length;
    h+=`<div class="data-card" data-ch="${k}"><div class="dcn">${c.name}</div><div class="dcd">共${c.questions.length}题</div><div class="dcs">✅${r} ❌${d-r} 📊${d}/${c.questions.length}</div></div>`;
  }
  h+=`</div><div class="action-row">`;
  h+=`<button class="action-btn pri" data-action="sw-starred">⭐ 收藏 (${state.starredSet.size})</button>`;
  h+=`<button class="action-btn del" data-action="sw-clear">🗑 清空学习数据</button></div>`;
  container.innerHTML=h;
}

// === 弹窗 ===
function showClearConfirm(){
  document.getElementById("modalTitle").textContent="🗑 确认清空";
  document.getElementById("modalText").textContent="确定要清空所有学习记录吗？（错题本、收藏、答题历史将全部删除，题库数据不受影响）";
  document.getElementById("modalConfirmBtn").onclick=function(){clearAllData();closeModal();showToast("✅ 已清空所有学习数据");render();};
  document.getElementById("modalOverlay").classList.add("show");
}
function closeModal(){document.getElementById("modalOverlay").classList.remove("show");}
function showToast(m){
  const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove("show"),1500);
}

// === 初始化 ===
loadData();
renderChSelect();
</script>
