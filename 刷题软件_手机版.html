<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>计组刷题 · 手机版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#4f46e5;--primary-light:#818cf8;--primary-dark:#3730a3;--bg:#f0f2f5;--card:#fff;--text:#1f2937;--text-light:#6b7280;--border:#e5e7eb;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding-bottom:70px;min-height:100vh;overflow-x:hidden}
/* Top Bar */
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between}
.top-bar .title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.top-bar .title .icon{font-size:20px}
.top-bar .stats{font-size:12px;color:var(--text-light);display:flex;gap:10px;align-items:center}
.top-bar .stats span{white-space:nowrap}
/* Content */
.content{padding:12px 14px;max-width:600px;margin:0 auto}
/* Stats Grid */
.stats-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.stat-mini{flex-shrink:0;background:var(--card);border-radius:8px;padding:8px 14px;box-shadow:var(--shadow);text-align:center;min-width:72px}
.stat-mini .num{font-size:20px;font-weight:700;color:var(--primary);line-height:1.2}
.stat-mini .lbl{font-size:11px;color:var(--text-light)}
/* Mode Selector */
.mode-scroll{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mode-scroll::-webkit-scrollbar{display:none}
.mode-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.mode-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* Progress */
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
/* Question Card */
.q-card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:18px 16px;margin-bottom:12px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:4px}
.q-number{font-size:12px;color:var(--text-light);font-weight:500}
.q-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.q-type{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.q-type-dx{background:#dbeafe;color:#2563eb}
.q-type-pd{background:#fef3c7;color:#d97706}
.q-type-tk{background:#d1fae5;color:#059669}
.q-type-jd{background:#ede9fe;color:#7c3aed}
.q-type-js{background:#fce7f3;color:#db2777}
.q-chapter{font-size:11px;padding:2px 8px;background:#f3f4f6;border-radius:10px;color:var(--text-light)}
.star-btn{font-size:22px;line-height:1;cursor:pointer;padding:0 2px;background:none;border:none}
.q-text{font-size:15px;line-height:1.8;margin-bottom:14px;white-space:pre-wrap;color:var(--text)}
/* Options */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all .12s;background:var(--card);user-select:none;-webkit-user-select:none}
.opt:active{transform:scale(0.99)}
.opt.sel{border-color:var(--primary);background:#eef2ff}
.opt.cr{border-color:var(--success);background:#ecfdf5}
.opt.wr{border-color:var(--danger);background:#fef2f2}
.opt.dis{cursor:default;opacity:0.9}
.opt .lt{width:26px;height:26px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0}
.opt.cr .lt{background:var(--success);color:#fff}
.opt.wr .lt{background:var(--danger);color:#fff}
.opt.sel .lt{background:var(--primary);color:#fff}
.opt .tx{font-size:14px;line-height:1.5;padding-top:2px;flex:1}
/* Fill Input */
.fill-ipt{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:10px;background:var(--card)}
.fill-ipt:focus{border-color:var(--primary)}
.fill-ipt.cr{border-color:var(--success);background:#ecfdf5}
.fill-ipt.wr{border-color:var(--danger);background:#fef2f2}
/* Answer Box */
.ans-box{background:#f9fafb;border-radius:8px;padding:14px;margin-top:10px;border-left:3px solid var(--primary);display:none;font-size:14px;line-height:1.7}
.ans-box.show{display:block}
.ans-box .albl{font-weight:600;color:var(--primary);font-size:13px;margin-bottom:6px}
.ans-box .act{white-space:pre-wrap}
/* Result Banner */
.rb{padding:12px 14px;border-radius:10px;font-size:14px;font-weight:600;text-align:center;margin-bottom:8px}
.rb.cr{background:#ecfdf5;color:var(--success);border:1px solid #a7f3d0}
.rb.wr{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
/* Nav Buttons */
.nav-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px;flex-wrap:wrap}
.nav-btn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:14px;font-weight:500;cursor:pointer;transition:all .12s;text-align:center;min-width:60px}
.nav-btn:active{transform:scale(0.97)}
.nav-btn:disabled{opacity:0.35;cursor:default}
.nav-btn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.nav-btn.suc{background:var(--success);color:#fff;border-color:var(--success)}
.nav-page{font-size:13px;color:var(--text-light);text-align:center;min-width:70px}

/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding:4px 0 env(safe-area-inset-bottom,4px) 0;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 2px;cursor:pointer;border:none;background:none;font-size:10px;color:var(--text-light);transition:color .12s;min-width:0}
.bnav-item .bi{font-size:20px;line-height:1.2}
.bnav-item .bl{font-size:10px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bnav-item.active{color:var(--primary)}
.bnav-item .bd{background:var(--danger);color:#fff;font-size:9px;border-radius:8px;padding:0 5px;position:absolute;top:0;right:2px;line-height:14px}

/* Chapter selector for mobile */
.ch-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ch-item{padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.ch-item:active{transform:scale(0.99);border-color:var(--primary-light)}
.ch-item .chn{font-weight:600;font-size:14px}
.ch-item .chc{font-size:12px;color:var(--text-light)}

/* Data panel */
.data-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.data-card{padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .12s}
.data-card:active{transform:scale(0.99);border-color:var(--primary-light)}
.data-card .dcn{font-weight:600;font-size:14px;margin-bottom:2px}
.data-card .dcd{font-size:12px;color:var(--text-light)}
.data-card .dcs{font-size:12px;color:var(--primary);font-weight:500;margin-top:2px}

/* Empty */
.empty{padding:40px 20px;text-align:center;color:var(--text-light)}
.empty .ei{font-size:48px;margin-bottom:10px}
.empty .et{font-size:15px}

/* Switch row */
.switch-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.switch-row label{font-size:13px;color:var(--text-light);display:flex;align-items:center;gap:5px}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="top-bar">
  <div class="title"><span class="icon">📚</span> <span id="pageTitle">计组刷题</span></div>
  <div class="stats" id="statsBar">
    <span id="statProg">0/0</span>
    <span id="statWrong" style="color:var(--danger)">✗0</span>
  </div>
</div>

<div class="content" id="mainContent"></div>

<!-- Bottom Navigation -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bnav-item active" data-mode="chapter" onclick="switchMode('chapter')">
    <span class="bi">📖</span><span class="bl">章节</span>
  </button>
  <button class="bnav-item" data-mode="all" onclick="switchMode('all')">
    <span class="bi">📝</span><span class="bl">全部</span>
  </button>
  <button class="bnav-item" data-mode="random" onclick="switchMode('random')">
    <span class="bi">🎲</span><span class="bl">随机</span>
  </button>
  <button class="bnav-item" data-mode="wrong" onclick="switchMode('wrong')">
    <span class="bi">❌</span><span class="bl">错题</span>
    <span class="bd" id="wrongBadge" style="display:none">0</span>
  </button>
  <button class="bnav-item" data-mode="browse" onclick="switchMode('browse')">
    <span class="bi">🔍</span><span class="bl">题库</span>
  </button>
</nav>

<script>
// ============================================================
// 题库数据 - 完全复用桌面版，可在此添加新章节/题目
// ============================================================
const QUESTION_BANK = {
  "ch1":{
    id:"ch1",name:"第一章 计算机系统概述",
    questions:[
      {id:"ch1_1",type:"danxuan",question:"所谓超大规模集成电路(VLSI),是指一个芯片上能容纳( )电子元件。",options:["A. 数十个","B. 数百个","C. 数千个","D. 数万个以上"],answer:"D"},
      {id:"ch1_2",type:"danxuan",question:"对计算机的软、硬件资源进行管理，是( )的功能。",options:["A. 操作系统","B. 数据库管理系统","C. 语言处理程序","D. 用户应用软件"],answer:"A"},
      {id:"ch1_3",type:"danxuan",question:"CPU的组成不包括( )",options:["A. 存储器","B. 寄存器","C. 控制器","D. 运算器"],answer:"A"},
      {id:"ch1_4",type:"danxuan",question:"主机上能对指令进行译码的部件是( )",options:["A. 存储器","B. 寄存器","C. 控制器","D. 运算器"],answer:"C"},
      {id:"ch1_5",type:"danxuan",question:"指令寄存器IR存放的是( )",options:["A. 下一条要执行的指令","B. 已执行完了的指令","C. 正在执行的指令","D. 要转移的指令"],answer:"C"},
      {id:"ch1_6",type:"danxuan",question:"按冯·诺依曼结构组成计算机，主机的构成是( )",options:["A. 运算器和控制器","B. 运算器和内存储器","C. CPU和主存储器","D. 控制器和外部设备"],answer:"C"},
      {id:"ch1_7",type:"danxuan",question:"下列描述中，( )是正确的。",options:["A. 控制器能理解、解释和执行所有机器的指令","B. 一台计算机包括输入设备、输出设备、控制器、存储器及运算器五个部件","C. 所有的数据运算都在控制器中完成","D. 以上都正确"],answer:"B"},
      {id:"ch1_8",type:"danxuan",question:"有些计算机将一部分软件存储在只读存储器ROM中，称之为( )",options:["A. 硬件","B. 软件","C. 固件","D. 芯片"],answer:"C"},
      {id:"ch1_9",type:"danxuan",question:"用来指定待执行指令所在地址的寄存器是( )",options:["A. 指令寄存器IR","B. 程序计数器PC","C. 地址寄存器MAR","D. 数据缓冲寄存器MDR"],answer:"B"},
      {id:"ch1_10",type:"danxuan",question:"若某个程序在执行时，负责将源程序全部翻译成目标程序的机器语言指令序列，执行时计算机直接执行目标程序，则该程序称为( )",options:["A. 目标程序","B. 编译程序","C. 解释程序","D. 汇编程序"],answer:"D"},
      {id:"ch1_11",type:"danxuan",question:"在计算机系统的层次结构中，从下往上，各级相对顺序正确的应当是( )。",options:["A. 汇编语言级——操作系统级——高级语言级","B. 微程序级----传统机器级——汇编语言级","C. 传统机器级——高级语言级——汇编语言级","D. 汇编语言级———系统分析级——高级语言级"],answer:"B"},
      {id:"ch1_12",type:"danxuan",question:"在计算机系统的层次结构中，计算机被定义为( )的集合。",options:["A. 能存储和执行相应语言程序的算法和数据结构","B. 机器语言程序(指令序列)和微程序(微指令序列)","C. 应用软件和系统软件","D. 软件和硬件"],answer:"A"},
      {id:"ch1_13",type:"danxuan",question:"开发并行性的途径有( )、资源重复和资源共享。",options:["A. 多计算机系统","B. 多道分时","C. 分布式处理系统","D. 时间重叠"],answer:"D"},
      {id:"ch1_14",type:"danxuan",question:"从计算机系统结构上讲，机器语言程序员所看到的机器属性是( )。",options:["A. 计算机软件所要完成的功能","B. 计算机硬件的全部组成","C. 编程要用到的硬件组成","D. 计算机和部件的硬件实现"],answer:"C"},
      {id:"ch1_15",type:"danxuan",question:"下列说法中不正确的是( )。",options:["A. 软件设计费用比软件重复生产的费用高","B. 硬件功能只需实现一次，而软件功能可能要多次重复实现","C. 硬件的生产费用比软件的生产费用高","D. 硬件的设计费用比软件的设计费用高"],answer:"B"},
      {id:"ch1_16",type:"danxuan",question:"计算机系统结构不包括( )。",options:["A. 主存速度","B. 机器工作状态","C. 信息保护","D. 数据表示"],answer:"A"},
      {id:"ch1_17",type:"danxuan",question:"计算机组成设计不考虑( )。",options:["A. 专用部件设置","B. 功能部件的集成度","C. 控制机构的组成","D. 缓冲技术"],answer:"B"},
      {id:"ch1_18",type:"danxuan",question:"在计算机系统设计中，提高软件功能实现的比例可( )",options:["A. 提高解题速度","B. 减少需要的存储器容量","C. 提高系统的灵活性","D. 提高系统的性能价格比"],answer:"C"},
      {id:"ch1_19",type:"danxuan",question:"除了分布式处理系统、机群系统外,并行处理计算按其基本结构特征可分为流水线计算机、阵列计算机、多处理机和( )。",options:["A. 计算机网络","B. 控制流计算机","C. 多处理器系统","D. 数据流计算机"],answer:"D"},
      {id:"ch1_20",type:"danxuan",question:"不同系统的机器之间，实现软件移植的途径不包括( )。",options:["A. 用统一的高级语言","B. 用统一的汇编语言","C. 模拟","D. 仿真"],answer:"B"},
      {id:"ch1_21",type:"danxuan",question:"从器件角度看，计算机经历了五代变化。但从系统结构看，至今绝大多数计算机仍属于( )计算机。",options:["A. 并行","B. 冯·诺依曼","C. 智能","D. 串行"],answer:"B"},
      {id:"ch1_22",type:"danxuan",question:"冯·诺依曼机工作的基本方式的特点是( )。",options:["A. 多指令流单数据流","B. 按地址访问并顺序执行指令","C. 堆栈操作","D. 存储器按内容选择地址"],answer:"B"},
      {id:"ch1_23",type:"danxuan",question:"在下面描述的汇编语言基本概念中，正确的表述是( )。",options:["A. 对程序员的训练要求来说，需要硬件知识","B. 汇编语言对机器的依赖性高","C. 用汇编语言编写程序的难度比高级语言小","D. 汇编语言编写的程序执行速度比高级语言慢"],answer:"B"},
      {id:"ch1_24",type:"danxuan",question:"计算机硬件能直接执行的语言有( )。",options:["A. 符号语言","B. 机器语言","C. 机器语言与汇编语言","D. 汇编语言"],answer:"B"},
      {id:"ch1_25",type:"danxuan",question:"下面说法不正确的是( )。",options:["A. 任何可以由软件实现的操作也可以用硬件来实现","B. 直接面向高级语言的机器目前已经实现","C. 固件就功能而言类似于软件，而从形态上来说又类似于硬件","D. 在计算机系统的层次结构中，微程序属于硬件级，其他四级都是软件级"],answer:"B"},
      {id:"ch1_26",type:"danxuan",question:"1946年研制成功的第一台电子数字计算机称为( )。",options:["A. EDVAC","B. ENIAC","C. EVNAC","D. EINAC"],answer:"B"},
      {id:"ch1_27",type:"danxuan",question:"完整的计算机系统应包括( )。",options:["A. 运算器、存储器、控制器","B. 外部设备和主机","C. 主机和存储器","D. 配套的硬件和软件设备"],answer:"D"},
      {id:"ch1_28",type:"danxuan",question:"计算机系统中的存储器系统是指( )",options:["A. RAM存储器","B. ROM存储器","C. 内存储器","D. 内存储器和外存储器"],answer:"D"},
      {id:"ch1_29",type:"danxuan",question:"至今为止,计算机中的所有信息仍以二进制方式表示的理由是( )",options:["A. 节约元件","B. 运算速度快","C. 物理器件性能所致","D. 信息处理方便"],answer:"C"},
      {id:"ch1_30",type:"danxuan",question:"若某个程序在执行时，负责将源程序翻译成机器语言而且一次只能读取、翻译并执行源程序的一行语句，则该程序称为( )",options:["A. 目标程序","B. 编译程序","C. 解释程序","D. 汇编程序"],answer:"C"},
      {id:"ch1_31",type:"danxuan",question:"运算器的主要功能除了进行算术运算之外，还能进行( )。",options:["A. 初等函数运算","B. 逻辑运算","C. 对错判断","D. 浮点运算"],answer:"B"},
      {id:"ch1_32",type:"danxuan",question:"运算器的核心部分是( )。",options:["A. 数据总线","B. 多路开关","C. 算术逻辑运算单元","D. 累加寄存器"],answer:"C"},
      {id:"ch1_33",type:"danxuan",question:"当且仅当( )发生时,认为浮点数溢出。",options:["A. 阶码上溢","B. 尾数上溢","C. 尾数与阶码同时上溢","D. 尾数或阶码上溢"],answer:"A"},
      {id:"ch1_34",type:"danxuan",question:"关于ALU的叙述中,不正确的是( )",options:["A. ALU是功能较强的组合电路","B. ALU的基本逻辑结构是超前进位加法器","C. ALU的输入只有参加运算的两个数,输出是两个数的和","D. SN74181是典型的4位ALU"],answer:"C"},
      {id:"ch1_35",type:"panduan",question:"现在的数字计算机系统的硬件都是由超大规模集成电路构成的。",options:["A. 对","B. 错"],answer:"A"},
      {id:"ch1_36",type:"panduan",question:"运算器只能对数据进行算术运算。",options:["A. 对","B. 错"],answer:"B"},
      {id:"ch1_37",type:"panduan",question:"存储器中存放计算机运行中的数据。",options:["A. 对","B. 错"],answer:"A"},
      {id:"ch1_38",type:"panduan",question:"在运算器中有若干个临时存放数据的部件，称为Cache。",options:["A. 对","B. 错"],answer:"B"},
      {id:"ch1_39",type:"panduan",question:"寄存器是存储器中的一个存放数据的单元。",options:["A. 对","B. 错"],answer:"B"},

      {id:"ch1_f1",type:"tiankong",question:"第一代计算机的逻辑元件采用____，主存使用延迟线或磁鼓存储信息。",answer:"电子管"},

      {id:"ch1_s1",type:"jianda",question:"计算机硬件包括哪些基本功能部件？为什么要有这些部件？",answer:"计算机硬件主要包括运算器、控制器、存储器、输入/输出设备和总线。\n运算器负责执行算术和逻辑运算；控制器负责协调各部件；存储器存储程序和数据；输入/输出设备用于交互；总线用于连接各部件。"},

};

function ls(k,v){try{if(v===undefined){const d=localStorage.getItem("cc_"+k);return d?JSON.parse(d):null}else{localStorage.setItem("cc_"+k,JSON.stringify(v));return v}}catch(e){return v}}
function loadState(){try{
  const w=ls("wrong");if(w)state.wrongSet=new Set(w);
  const s=ls("starred");if(s)state.starredSet=new Set(s);
  const h=ls("history");if(h)state.history=h;
}catch(e){}}
function saveState(){try{
  ls("wrong",[...state.wrongSet]);ls("starred",[...state.starredSet]);ls("history",state.history);
}catch(e){}}

function getAllQuestions(){const a=[];for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];c.questions.forEach(q=>a.push({...q,chapterId:k,chapterName:c.name}))}return a}
function getChQ(chId){const c=QUESTION_BANK[chId];return c?c.questions.map(q=>({...q,chapterId:chId,chapterName:c.name})):[]}
function getCurQ(){
  switch(state.mode){
    case"chapter":return getChQ(state.chapterId);
    case"all":return getAllQuestions();
    case"random":{const a=getAllQuestions();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
    case"wrong":return getAllQuestions().filter(q=>state.wrongSet.has(q.id));
    case"starred":return getAllQuestions().filter(q=>state.starredSet.has(q.id));
    default:return getChQ(state.chapterId);
  }
}

function render(){
  renderStats();
  const qs=getCurQ();
  const title=document.getElementById("pageTitle");
  const content=document.getElementById("mainContent");
  // nav
  document.querySelectorAll(".bnav-item").forEach(el=>el.classList.toggle("active",el.dataset.mode===state.mode));
  const wb=document.getElementById("wrongBadge");
  if(state.wrongSet.size>0){wb.style.display="block";wb.textContent=state.wrongSet.size}else{wb.style.display="none"}

  if(state.mode==="browse"){title.textContent="🔍 题库浏览";renderBrowse(content);return}
  if(qs.length===0){
    title.textContent=state.mode==="wrong"?"❌ 错题本":state.mode==="starred"?"⭐ 收藏":"📝 刷题";
    content.innerHTML=`<div class="empty"><div class="ei">🎉</div><div class="et">${state.mode==="wrong"?"暂无错题，继续加油！":state.mode==="starred"?"暂无收藏题目":"暂无题目"}</div></div>`;
    return;
  }
  const modeNames={chapter:"📖 按章节",all:"📝 全部题目",random:"🎲 随机刷题",wrong:"❌ 错题本",starred:"⭐ 收藏"};
  title.textContent=modeNames[state.mode]||"刷题";

  const idx=Math.min(state.currentIndex,qs.length-1);
  const q=qs[idx];if(!q)return;
  const isChoice=q.type==="danxuan"||q.type==="panduan";
  const isFill=q.type==="tiankong";
  const isOpen=q.type==="jianda"||q.type==="jisuan";

  let h=`<div class="progress-bar"><div class="progress-fill" style="width:${((idx+1)/qs.length*100).toFixed(1)}%"></div></div>`;
  h+=`<div class="q-card">`;
  h+=`<div class="q-header"><span class="q-number">#${idx+1}/${qs.length}</span><div class="q-badges">`;
  if(q.chapterName)h+=`<span class="q-chapter">${q.chapterName}</span>`;
  h+=`<span class="q-type ${TYPE_CLASSES[q.type]}">${TYPE_LABELS[q.type]||q.type}</span>`;
  const starred=state.starredSet.has(q.id);
  h+=`<button class="star-btn" onclick="toggleStar('${q.id}')">${starred?'⭐':'☆'}</button>`;
  h+=`</div></div>`;
  h+=`<div class="q-text">${q.question}</div>`;

  if(isChoice){
    h+=`<div class="options">`;
    q.options.forEach((opt,oi)=>{
      const lt=LETTERS[oi];let cls="opt";
      if(state.answered){cls+=" dis";if(lt===q.answer)cls+=" cr";else if(lt===state.selectedOption)cls+=" wr"}else if(lt===state.selectedOption)cls+=" sel";
      h+=`<div class="${cls}" onclick="${state.answered?'':`pickOpt('${lt}','${q.id}')`}"><span class="lt">${lt}</span><span class="tx">${opt.replace(/^[A-Z]\.\s*/,'')}</span></div>`;
    });
    h+=`</div>`;
  }
  if(isFill){
    h+=`<input class="fill-ipt" id="fi" placeholder="输入答案..." onkeydown="if(event.key==='Enter')checkFill('${q.id}')">`;
    if(state.answered)h+=`<div style="font-size:13px;margin-bottom:8px"><strong>正确答案：</strong>${q.answer}</div>`;
    else h+=`<button class="nav-btn pri" onclick="checkFill('${q.id}')" style="padding:8px 16px;flex:none;font-size:13px">确认</button>`;
  }
  if(isOpen){
    if(state.answered)h+=`<div class="ans-box show"><div class="albl">📌 参考答案</div><div class="act">${q.answer}</div></div>`;
    else h+=`<button class="nav-btn pri" onclick="showAns()" style="padding:8px 16px;flex:none;font-size:13px">查看答案</button><div class="ans-box" id="abox"><div class="albl">📌 参考答案</div><div class="act">${q.answer}</div></div>`;
  }
  if(isChoice&&state.answered){
    const cr=state.selectedOption===q.answer;
    h+=`<div class="rb ${cr?'cr':'wr'}">${cr?'✅ 回答正确！':'❌ 回答错误'}${cr?'':`，正确答案：${q.answer}`}</div>`;
  }
  if(isFill&&state.answered){
    h+=`<div class="rb" id="fillR"></div>`;
  }
  h+=`</div>`;
  // nav
  h+=`<div class="nav-row">`;
  h+=`<button class="nav-btn" onclick="go(-1)" ${idx===0?'disabled':''}>◀</button>`;
  h+=`<span class="nav-page">${idx+1}/${qs.length}</span>`;
  h+=`<button class="nav-btn" onclick="go(1)" ${idx>=qs.length-1?'disabled':''}>▶</button>`;
  if(state.mode==="random")h+=`<button class="nav-btn suc" onclick="nextRand()">🎲</button>`;
  h+=`</div>`;
  content.innerHTML=h;
  // restore fill
  if(isFill&&state.answered&&state.selectedOption){
    const inp=document.getElementById("fi");
    if(inp){inp.value=state.selectedOption;checkFill(q.id,true)}
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderStats(){
  const all=getAllQuestions();
  const done=Object.keys(state.history).length;
  document.getElementById("statProg").textContent=done+"/"+all.length;
}

function pickOpt(lt,qId){
  const qs=getCurQ().find(q=>q.id===qId);if(!q||state.answered)return;
  state.selectedOption=lt;state.answered=true;
  const cr=lt===q.answer;
  state.history[q.id]={correct:cr,count:(state.history[q.id]?.count||0)+1};
  if(cr)state.wrongSet.delete(q.id);else state.wrongSet.add(q.id);
  saveState();render();
}

function checkFill(qId,quiet){
  const q=getCurQ().find(q=>q.id===qId);if(!q)return;
  const inp=document.getElementById("fi");if(!inp)return;
  const v=inp.value.trim();if(!v&&!quiet)return;
  state.answered=true;state.selectedOption=v;
  const n=s=>s.replace(/\s+/g,'').toLowerCase();
  const cr=n(v)===n(q.answer)||q.answer.split(',').some(a=>n(v).includes(n(a)));
  if(!quiet){
    state.history[q.id]={correct:cr,count:(state.history[q.id]?.count||0)+1};
    if(cr)state.wrongSet.delete(q.id);else state.wrongSet.add(q.id);
    saveState();
  }
  inp.className="fill-ipt "+(cr?"cr":"wr");
  const r=document.getElementById("fillR");
  if(r){r.textContent=cr?"✅ 回答正确！":"❌ 回答错误";r.className="rb "+(cr?"cr":"wr");if(!cr)r.innerHTML+=`，正确答案：${q.answer}`}
  render();
}

function showAns(){const b=document.getElementById("abox");if(b){b.classList.add("show");state.answered=true}}

function toggleStar(qId){
  if(state.starredSet.has(qId))state.starredSet.delete(qId);else state.starredSet.add(qId);
  saveState();render();
}

function go(d){const qs=getCurQ();const ni=state.currentIndex+d;if(ni<0||ni>=qs.length)return;state.currentIndex=ni;state.answered=false;state.selectedOption=null;render()}
function nextRand(){const qs=getCurQ();state.currentIndex=Math.floor(Math.random()*qs.length);state.answered=false;state.selectedOption=null;render()}

function switchMode(m){
  if(m==="chapter"&&state.mode==="chapter"){renderChSelect();return}
  state.mode=m;state.currentIndex=0;state.answered=false;state.selectedOption=null;
  if(m==="chapter")renderChSelect();else render();
}
function switchCh(id){state.chapterId=id;state.mode="chapter";state.currentIndex=0;state.answered=false;state.selectedOption=null;render()}

function renderChSelect(){
  const title=document.getElementById("pageTitle");title.textContent="📖 选择章节";
  const content=document.getElementById("mainContent");
  let h=`<div class="stats-row">`;
  let total=0;for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];total+=c.questions.length}
  h+=`<div class="stat-mini"><div class="num">${total}</div><div class="lbl">总题数</div></div>`;
  h+=`<div class="stat-mini"><div class="num">${Object.keys(state.history).length}</div><div class="lbl">已答</div></div>`;
  h+=`<div class="stat-mini"><div class="num">${state.wrongSet.size}</div><div class="lbl">错题</div></div>`;
  h+=`</div>`;
  h+=`<div class="ch-list">`;
  for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];
    h+=`<div class="ch-item" onclick="switchCh('${k}')"><div><div class="chn">${c.name}</div><div class="chc">${c.questions.length} 题</div></div><span style="color:var(--primary)">→</span></div>`;
  }
  h+=`</div>`;
  content.innerHTML=h;
}

function renderBrowse(container){
  let h=`<div class="data-grid">`;
  let total=0,types={},correct=0;
  for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];total+=c.questions.length;
    c.questions.forEach(q=>{types[q.type]=(types[q.type]||0)+1;if(state.history[q.id]?.correct)correct++})}
  h+=`<div class="data-card"><div class="dcn">📊 总统计</div><div class="dcd">总题 ${total} | 已答 ${Object.keys(state.history).length} | 正确 ${correct} | 错题 ${state.wrongSet.size}</div><div class="dcs">`;
  for(const t in types)h+=`${TYPE_LABELS[t]||t}:${types[t]} `;
  h+=`</div></div>`;
  for(const k in QUESTION_BANK){const c=QUESTION_BANK[k];
    const done=c.questions.filter(q=>state.history[q.id]).length;
    const cr=c.questions.filter(q=>state.history[q.id]?.correct).length;
    h+=`<div class="data-card" onclick="switchCh('${k}')"><div class="dcn">${c.name}</div><div class="dcd">共 ${c.questions.length} 题</div><div class="dcs">已完成 ${done} 题 | 正确 ${cr} 题</div></div>`;
  }
  h+=`</div>`;
  container.innerHTML=h;
}

// Init
loadState();renderStats();
renderChSelect();
</script>
</body>
</html>
